*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f0e8;
  --bg2:#ede8dc;
  --ink:#1a1714;
  --ink2:#3d3830;
  --muted:#7a7268;
  --border:#d4ccbb;
  --accent:#b85c2c;
  --accent2:#2c6b8a;
  --green:#2d7a4f;
  --red:#a83232;
  --gold:#c49a3c;
  --surface:#fff9f0;
  --shadow:rgba(26,23,20,0.08);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 2.5rem;height:60px;
  background:rgba(245,240,232,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--accent);letter-spacing:0.02em;}
.nav-links{display:flex;gap:0.25rem}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0.35rem 0.75rem;border-radius:3px;transition:all 0.2s;}
.nav-links a:hover{color:var(--ink);background:var(--bg2)}

.placeholder{padding:8rem 2rem;text-align:center;color:var(--muted);font-size:1.2rem;}
</style>
</head>
